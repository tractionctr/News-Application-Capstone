{% extends 'base.html' %}

{% block title %}Edit Article - News Application{% endblock %}

{% block content %}
<h1>Edit Article</h1>

{% if error %}
<p style="color: red;">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <p>
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" value="{{ article.title }}" required style="width: 100%;">
    </p>
    <p>
        <label for="content">Content:</label><br>
        <textarea id="content" name="content" rows="10" required style="width: 100%;">{{ article.content }}</textarea>
    </p>
    <p>
        <label for="publisher">Publisher (optional):</label><br>
        <select id="publisher" name="publisher">
            <option value="">-- Independent Article --</option>
            {% for publisher in publishers %}
            <option value="{{ publisher.id }}" {% if article.publisher == publisher %}selected{% endif %}>{{ publisher.name }}</option>
            {% endfor %}
        </select>
    </p>
    <p>
        <button type="submit">Save Changes</button>
        <a href="{% if user.role == 'Editor' %}{% url 'editor_dashboard' %}{% else %}{% url 'journalist_dashboard' %}{% endif %}">Cancel</a>
    </p>
</form>
{% endblock %}
