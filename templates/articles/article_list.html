{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">Published Articles</h1>

<div class="container">
    <div class="row">

        {% for article in articles %}
        <div class="col-md-4 mb-3">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h5 class="card-title">
                        <a href="{% url 'article_detail' article.pk %}">
                            {{ article.title }}
                        </a>
                    </h5>

                    <p class="card-text">
                        by {{ article.author.username }}
                    </p>

                    <p class="text-muted">
                        {{ article.created_at|date:"M d, Y" }}
                    </p>

                </div>
            </div>

        </div>
        {% endfor %}

    </div>
</div>

{% endblock %}
